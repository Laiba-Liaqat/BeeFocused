name: hive_focus
description: "Hive Focus — a minimal, distraction-aware productivity app where your focus builds a living apiary of honey."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Charts for the analytics dashboard
  fl_chart: ^0.68.0

  # Focus calendar (streak / consistency view)
  table_calendar: ^3.1.2

  # Local persistence (sessions, theme, stats)
  shared_preferences: ^2.2.3

  # Date formatting
  intl: ^0.19.0

  # Typography — warm, rounded, honey-inspired fonts
  google_fonts: ^6.2.1

  # Unique ids for sessions / jars
  uuid: ^4.4.0

  # Solana wallet integration foundation
  solana: ^0.31.0+1
  bip39: ^1.0.6
  flutter_secure_storage: ^9.2.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Uncomment and add real asset files if you drop in custom art:
  # assets:
  #   - assets/images/
